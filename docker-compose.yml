version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: bjj-postgres
    restart: always
    environment:
      POSTGRES_DB: bjj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: