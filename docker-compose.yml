version: '3.9'

services:

  postgres:
    image: postgres:17
    container_name: bjj-postgres
    restart: always

    environment:
      POSTGRES_DB: bjj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: bjj-api
    restart: always

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bjj
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  postgres_data: