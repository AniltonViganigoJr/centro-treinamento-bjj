spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.type.preferred_enum_type=VARCHAR

spring.jpa.properties.hibernate.schema.generation.create-source=metadata
spring.jpa.properties.hibernate.hbm2ddl.create_constraints=false